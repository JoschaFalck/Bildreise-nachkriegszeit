<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nachkriegszeit – Interaktive Bildreise | 8. Klasse</title>
  <meta name="description" content="Interaktive Bildreise zur Nachkriegszeit und Teilung Deutschlands für die 8. Klasse Mittelschule Bayern">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER ===== -->
    <header id="app-header" role="banner">
      <div class="header-inner">
        <div class="site-brand">
          <span class="site-icon" aria-hidden="true">&#9873;</span>
          <span class="site-title">Bildreise: Nachkriegszeit</span>
        </div>
        <div class="header-actions">
          <span id="station-indicator" class="station-indicator" aria-live="polite"></span>
          <button id="journal-toggle" class="btn-icon" aria-label="Lernjournal öffnen" aria-expanded="false">
            &#128221; Lernjournal
          </button>
        </div>
      </div>
      <div
        class="progress-bar-container"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-label="Lernfortschritt"
        id="progress-container"
      >
        <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <nav id="progress-steps" class="progress-steps" aria-label="Stationsübersicht"></nav>
    </header>

    <!-- ===== MAIN (rendered by JS) ===== -->
    <main id="main-content" role="main" tabindex="-1"></main>

    <!-- ===== HOTSPOT MODAL ===== -->
    <div
      id="modal-overlay"
      class="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-box" role="document">
        <div class="modal-header">
          <span id="modal-type-badge" class="modal-badge"></span>
          <h3 id="modal-title" class="modal-title">Hotspot</h3>
          <button
            id="modal-close"
            class="modal-close-btn"
            aria-label="Fenster schliessen"
            onclick="closeModal()"
          >&times;</button>
        </div>
        <div id="modal-body" class="modal-body" aria-live="polite"></div>
        <div id="modal-note-area" class="modal-note-area">
          <label for="modal-note" class="note-label">Meine Notiz zu diesem Hotspot:</label>
          <textarea
            id="modal-note"
            rows="3"
            placeholder="Schreib hier deine Notiz oder Beobachtung..."
            aria-label="Notiz zu diesem Hotspot"
          ></textarea>
          <button class="btn btn-sm btn-secondary" onclick="saveHotspotNote()">Notiz speichern</button>
        </div>
      </div>
    </div>

    <!-- ===== JOURNAL PANEL ===== -->
    <div
      id="journal-backdrop"
      class="journal-backdrop"
      aria-hidden="true"
      onclick="closeJournal()"
    ></div>
    <aside
      id="journal-panel"
      class="journal-panel"
      aria-hidden="true"
      aria-label="Mein Lernjournal"
    >
      <div class="journal-header">
        <h2>Mein Lernjournal</h2>
        <button id="journal-close" class="btn-icon" aria-label="Journal schliessen" onclick="closeJournal()">&times;</button>
      </div>
      <div id="journal-content" class="journal-content">
        <p class="journal-empty">Hier erscheinen deine gespeicherten Antworten, Notizen und Beobachtungen.</p>
      </div>
      <div class="journal-footer">
        <button class="btn btn-secondary" onclick="printJournal()">&#128424; Drucken / PDF</button>
        <button class="btn btn-danger" onclick="confirmClearJournal()">&#128465; Neu starten</button>
      </div>
    </aside>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer" role="contentinfo">
      <p>
        <a href="impressum.html">Impressum</a> |
        <a href="datenschutz.html">Datenschutz</a> |
        <a href="lehrer.html">Lehrerbereich</a>
      </p>
      <p class="footer-note">Lernmaterial Geschichte | 8. Klasse Mittelschule Bayern | Thema: Nachkriegszeit</p>
    </footer>

  </div><!-- #app -->

  <!-- DATA must load before APP -->
  <script src="scripts/data.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
